name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release candidate
        run: npm run release:check

      - name: Prepare release summary
        run: npm run release:prepare

      - name: Package VS Code extension
        run: npm run package --workspace=packages/vscode-extension

      - name: Upload VS Code extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: packages/vscode-extension/*.vsix

  package-executables:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release candidate
        run: npm run release:check

      - name: Package Windows executables
        run: npm run package:exe

      - name: Upload executable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executables
          path: artifacts/exe/*.exe

  release:
    runs-on: ubuntu-latest
    needs:
      - package-extension
      - package-executables

    steps:
      - name: Download VS Code extension artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: release-artifacts/vscode-extension

      - name: Download executable artifacts
        uses: actions/download-artifact@v4
        with:
          name: executables
          path: release-artifacts/executables

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/vscode-extension/*.vsix
            release-artifacts/executables/*.exe
